<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Challenge Portal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      max-width: 800px;
      width: 100%;
      padding: 40px;
    }
    
    h1 {
      color: #333;
      margin-bottom: 10px;
      text-align: center;
    }
    
    .status {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .status.connected {
      color: #27ae60;
      font-weight: bold;
    }
    
    .section {
      margin-bottom: 30px;
    }
    
    .section h2 {
      color: #667eea;
      margin-bottom: 15px;
      font-size: 18px;
    }
    
    .form-group {
      margin-bottom: 15px;
    }
    
    label {
      display: block;
      color: #333;
      margin-bottom: 5px;
      font-weight: 500;
    }
    
    input[type="text"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    
    input[type="text"]:focus,
    input[type="number"]:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
    }
    
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    
    button {
      background: #667eea;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.3s;
      margin-right: 10px;
    }
    
    button:hover {
      background: #764ba2;
    }
    
    button.secondary {
      background: #95a5a6;
    }
    
    button.secondary:hover {
      background: #7f8c8d;
    }
    
    .list {
      display: grid;
      gap: 10px;
    }
    
    .item {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 5px;
      border-left: 4px solid #667eea;
    }
    
    .item-id {
      color: #667eea;
      font-size: 12px;
      margin-bottom: 5px;
      font-family: monospace;
    }
    
    .item-content {
      color: #333;
      margin-bottom: 10px;
    }
    
    .item-actions {
      display: flex;
      gap: 5px;
    }
    
    .item-actions button {
      padding: 5px 10px;
      font-size: 12px;
    }
    
    .loader {
      display: none;
      text-align: center;
      padding: 20px;
      color: #667eea;
    }
    
    .loader.active {
      display: block;
    }
    
    .message {
      padding: 10px 15px;
      border-radius: 5px;
      margin-bottom: 15px;
      display: none;
    }
    
    .message.show {
      display: block;
    }
    
    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎯 Challenge Portal</h1>
    <div class="status" id="status">Checking connection...</div>
    
    <!-- Challenges Section -->
    <div class="section">
      <h2>📋 Challenges</h2>
      <div class="message" id="challengeMessage"></div>
      
      <div class="form-group">
        <label>Challenge Title</label>
        <input type="text" id="challengeTitle" placeholder="Enter challenge title">
      </div>
      
      <div class="form-group">
        <label>Description</label>
        <textarea id="challengeDesc" placeholder="Enter challenge description"></textarea>
      </div>
      
      <div class="form-group">
        <label>Difficulty Level</label>
        <select id="challengeDifficulty">
          <option value="">Select difficulty</option>
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>
      
      <button onclick="createChallenge()">➕ Add Challenge</button>
      <button class="secondary" onclick="loadChallenges()">🔄 Refresh</button>
      
      <div class="loader" id="challengeLoader">Loading challenges...</div>
      <div class="list" id="challengeList"></div>
    </div>
    
    <!-- Submissions Section -->
    <div class="section">
      <h2>✅ Submissions</h2>
      <div class="message" id="submissionMessage"></div>
      
      <div class="form-group">
        <label>Challenge ID</label>
        <input type="text" id="submissionChallengeId" placeholder="Enter challenge ID">
      </div>
      
      <div class="form-group">
        <label>Code/Solution</label>
        <textarea id="submissionCode" placeholder="Enter your solution code"></textarea>
      </div>
      
      <button onclick="createSubmission()">📤 Submit</button>
      <button class="secondary" onclick="loadSubmissions()">🔄 Refresh</button>
      
      <div class="loader" id="submissionLoader">Loading submissions...</div>
      <div class="list" id="submissionList"></div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:5000/api';

    // Check server connection
    async function checkConnection() {
      try {
        const response = await fetch('http://localhost:5000/health');
        const data = await response.json();
        const statusEl = document.getElementById('status');
        statusEl.textContent = `✅ Connected - DB: ${data.db}`;
        statusEl.classList.add('connected');
      } catch (error) {
        const statusEl = document.getElementById('status');
        statusEl.textContent = '❌ Cannot connect to server. Is it running?';
        console.error('Connection error:', error);
      }
    }

    // Challenge functions
    async function createChallenge() {
      const title = document.getElementById('challengeTitle').value;
      const description = document.getElementById('challengeDesc').value;
      const difficulty = document.getElementById('challengeDifficulty').value;

      if (!title || !description || !difficulty) {
        showMessage('challengeMessage', 'Please fill all fields', 'error');
        return;
      }

      try {
        const response = await fetch(`${API_URL}/challenges`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, description, difficulty })
        });
        
        if (response.ok) {
          showMessage('challengeMessage', 'Challenge created successfully!', 'success');
          document.getElementById('challengeTitle').value = '';
          document.getElementById('challengeDesc').value = '';
          document.getElementById('challengeDifficulty').value = '';
          loadChallenges();
        }
      } catch (error) {
        showMessage('challengeMessage', 'Error creating challenge: ' + error.message, 'error');
      }
    }

    async function loadChallenges() {
      document.getElementById('challengeLoader').classList.add('active');
      try {
        const response = await fetch(`${API_URL}/challenges`);
        const challenges = await response.json();
        
        const list = document.getElementById('challengeList');
        list.innerHTML = challenges.map(c => `
          <div class="item">
            <div class="item-id">ID: ${c._id}</div>
            <div class="item-content">
              <strong>${c.title}</strong> (${c.difficulty})<br>
              ${c.description}
            </div>
            <div class="item-actions">
              <button onclick="deleteChallenge('${c._id}')">🗑️ Delete</button>
            </div>
          </div>
        `).join('');
      } catch (error) {
        document.getElementById('challengeList').innerHTML = '<p>Error loading challenges</p>';
      }
      document.getElementById('challengeLoader').classList.remove('active');
    }

    async function deleteChallenge(id) {
      if (confirm('Delete this challenge?')) {
        try {
          await fetch(`${API_URL}/challenges/${id}`, { method: 'DELETE' });
          loadChallenges();
        } catch (error) {
          showMessage('challengeMessage', 'Error deleting challenge', 'error');
        }
      }
    }

    // Submission functions
    async function createSubmission() {
      const challengeId = document.getElementById('submissionChallengeId').value;
      const code = document.getElementById('submissionCode').value;

      if (!challengeId || !code) {
        showMessage('submissionMessage', 'Please fill all fields', 'error');
        return;
      }

      try {
        const response = await fetch(`${API_URL}/submissions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ challengeId, code })
        });
        
        if (response.ok) {
          showMessage('submissionMessage', 'Submission created successfully!', 'success');
          document.getElementById('submissionChallengeId').value = '';
          document.getElementById('submissionCode').value = '';
          loadSubmissions();
        }
      } catch (error) {
        showMessage('submissionMessage', 'Error creating submission: ' + error.message, 'error');
      }
    }

    async function loadSubmissions() {
      document.getElementById('submissionLoader').classList.add('active');
      try {
        const response = await fetch(`${API_URL}/submissions`);
        const submissions = await response.json();
        
        const list = document.getElementById('submissionList');
        list.innerHTML = submissions.map(s => `
          <div class="item">
            <div class="item-id">ID: ${s._id}</div>
            <div class="item-content">
              Challenge: ${s.challengeId}<br>
              Status: <strong>${s.status}</strong>
            </div>
            <div class="item-actions">
              <button onclick="deleteSubmission('${s._id}')">🗑️ Delete</button>
            </div>
          </div>
        `).join('');
      } catch (error) {
        document.getElementById('submissionList').innerHTML = '<p>Error loading submissions</p>';
      }
      document.getElementById('submissionLoader').classList.remove('active');
    }

    async function deleteSubmission(id) {
      if (confirm('Delete this submission?')) {
        try {
          await fetch(`${API_URL}/submissions/${id}`, { method: 'DELETE' });
          loadSubmissions();
        } catch (error) {
          showMessage('submissionMessage', 'Error deleting submission', 'error');
        }
      }
    }

    function showMessage(elementId, text, type) {
      const el = document.getElementById(elementId);
      el.textContent = text;
      el.className = `message show ${type}`;
      setTimeout(() => el.classList.remove('show'), 3000);
    }

    // Initialize on page load
    window.addEventListener('load', () => {
      checkConnection();
      loadChallenges();
      loadSubmissions();
    });
  </script>
</body>
</html>
