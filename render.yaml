services:
  - type: web
    name: c-challenge-portal
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    plan: free
    autoDeploy: true
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: challenge_portal
      - key: FACULTY_USERNAME
        sync: false
      - key: FACULTY_PASSWORD
        sync: false
